<!DOCTYPE html>
<html>

<head>
<title>Purchase History</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Purchase History</h1>

<a href="/">⬅ Back to Store</a>

<br><br>

<table border="1" cellpadding="10">

<tr>
<th>Product</th>
<th>Price</th>
</tr>

{% for item in items %}

<tr>
<td>{{item.name}}</td>
<td>₹{{item.price}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
